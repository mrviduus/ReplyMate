name: Release

on:
  push:
    tags:
      - 'v*'

# GITHUB_TOKEN needs contents:write to create a Release and upload assets.
# (Default permissions are read-only in newer repos.)
permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        # Outputs:
        #   packages/ReplyMate-v${VERSION}.zip       (production)
        #   packages/ReplyMate-v${VERSION}-dev.zip   (development)
        run: npm run package

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Pull lines from `## [VERSION]` up to (but not including) the next `## [` heading.
          awk -v ver="$VERSION" '
            BEGIN { pat = "^## \\[" ver "\\]" }
            $0 ~ pat { found = 1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-body.md
          # Fallback if version section is missing
          if [ ! -s release-body.md ]; then
            echo "## ReplyMate v${VERSION}" > release-body.md
            echo "" >> release-body.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> release-body.md
          fi
          echo "---"
          cat release-body.md

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ReplyMate ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          fail_on_unmatched_files: true
          files: |
            packages/ReplyMate-v${{ steps.get_version.outputs.VERSION }}.zip

  chrome-web-store:
    runs-on: ubuntu-latest
    needs: create-release
    if: ${{ !contains(github.ref, 'beta') && !contains(github.ref, 'alpha') }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package for Chrome Web Store
        run: npm run package

      # Uncomment and configure when ready to auto-publish to Chrome Web Store
      # - name: Upload to Chrome Web Store
      #   uses: PlasmoHQ/bpp@v3
      #   with:
      #     keys: ${{ secrets.CHROME_WEB_STORE_KEYS }}
      #     artifact: packages/ReplyMate-*.zip
      #     verbose: true
