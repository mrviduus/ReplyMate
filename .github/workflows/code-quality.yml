name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check code formatting
      run: npm run format:check

    - name: Run ESLint (project config, --max-warnings=0)
      run: npm run lint

    # super-linter/slim@v4 was previously invoked here. It pulls down
    # stylelint + htmlhint + jscpd with their OWN defaults (ignoring repo
    # config) and reports thousands of false positives against LinkedIn-
    # targeted CSS / HTML. ESLint + Prettier + TypeScript already cover
    # what we actually want enforced.

  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run TypeScript type checking
      run: npm run type-check
    
    - name: Generate type coverage report
      run: npx type-coverage --detail --strict --ignore-files "**/*.test.ts" --ignore-files "**/*.spec.ts"
